name: Publish to PowerShell Gallery

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./src/dev-loop/dev-loop.psd1
          Write-Host "Publishing version: $($manifest.Version)"

      - name: Publish module
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Publish-Module -Path ./src/dev-loop -NuGetApiKey $env:NUGET_API_KEY -Verbose
